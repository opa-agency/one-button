{% extends "base.html" %}

{% block head_title %}Home{% endblock head_title %}

{% block content %}
  Dashboard

  <p>Completed Payments: {{ completed_payments_count }}</p>
  <p>Token expires in: <span id="token-countdown">--:--</span></p>

  <script>
    (function () {
      const countdownElement = document.getElementById("token-countdown");
      const expiresAt = new Date("{{ token_expires_at|escapejs }}").getTime();

      function formatRemaining(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      function updateCountdown() {
        const remaining = expiresAt - Date.now();
        if (remaining <= 0) {
          countdownElement.textContent = "Expired";
          clearInterval(timerId);
          return;
        }
        countdownElement.textContent = formatRemaining(remaining);
      }

      updateCountdown();
      const timerId = setInterval(updateCountdown, 1000);
    })();
  </script>
{% endblock content %}
